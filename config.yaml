acquire:
  zip_url_template: "https://ecmc.state.co.us/documents/data/downloads/production/{year}_prod_reports.zip"
  monthly_url: "https://ecmc.state.co.us/documents/data/downloads/production/monthly_prod.csv"
  start_year: 2020
  raw_dir: data/raw
  max_workers: 5
  sleep_seconds: 0.5

ingest:
  raw_dir: data/raw
  interim_dir: data/interim
  data_dictionary: references/production-data-dictionary.csv
  min_year: 2020

transform:
  interim_dir: data/interim
  processed_dir: data/processed
  entity_col: ApiSequenceNumber
  data_dictionary: references/production-data-dictionary.csv

features:
  processed_dir: data/processed
  output_dir: data/features

dask:
  scheduler: local
  n_workers: 4
  threads_per_worker: 2
  memory_limit: "3GB"
  dashboard_port: 8787

logging:
  log_file: logs/pipeline.log
  level: INFO
