acquire:
  base_url: "https://ecmc.state.co.us/documents/data/downloads/production"
  zip_url_template: "{base_url}/{year}_prod_reports.zip"
  monthly_url: "{base_url}/monthly_prod.csv"
  start_year: 2020
  raw_dir: "data/raw"
  workers: 5
  sleep_between_downloads: 0.5
  retry_count: 3

ingest:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  dictionary_path: "references/production-data-dictionary.csv"
  min_report_year: 2020
  partition_min: 10
  partition_max: 50

transform:
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  entity_col: "well_id"
  date_col: "production_date"
  api_county_col: "ApiCountyCode"
  api_sequence_col: "ApiSequenceNumber"
  api_sidetrack_col: "ApiSidetrack"
  min_report_year: 2020
  partition_min: 10
  partition_max: 50
  physical_bounds:
    OilProduced: {min: 0.0, max: null}
    GasProduced: {min: 0.0, max: null}
    WaterProduced: {min: 0.0, max: null}
    OilSales: {min: 0.0, max: null}
    GasSales: {min: 0.0, max: null}
    WaterPressureTubing: {min: 0.0, max: null}
    WaterPressureCasing: {min: 0.0, max: null}
    GasPressureTubing: {min: 0.0, max: null}
    GasPressureCasing: {min: 0.0, max: null}
  unit_consistency:
    OilProduced_max_bbl_month: 50000.0

features:
  processed_dir: "data/processed"
  features_dir: "data/features"
  rolling_windows: [3, 6, 12]
  lag_sizes: [1]
  decline_rate_lower_bound: -1.0
  decline_rate_upper_bound: 10.0
  train_test_cutoff_year: 2023
  partition_min: 10
  partition_max: 50

dask:
  scheduler: "local"
  n_workers: 4
  threads_per_worker: 1
  memory_limit: "3GB"
  dashboard_port: 8787

logging:
  log_file: "logs/pipeline.log"
  level: "INFO"
