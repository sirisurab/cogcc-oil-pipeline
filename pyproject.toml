[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cogcc-pipeline"
version = "0.1.0"
description = "COGCC oil and gas production data pipeline"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "requests>=2.28.0",
    "pyarrow>=12.0.0",
    "dask[distributed]>=2023.1.0",
    "bokeh>=3.0.0",
    "scikit-learn>=1.3.0",
    "pydantic>=2.0.0",
    "tqdm>=4.65.0",
    "pyyaml>=6.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=4.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-mock>=3.11.0",
    "ruff>=0.1.0",
    "mypy>=1.5.0",
    "pandas-stubs>=2.0.0",
    "types-requests>=2.28.0",
    "types-PyYAML>=6.0",
]

[project.scripts]
cogcc-pipeline = "cogcc_pipeline.pipeline:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["cogcc_pipeline*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = false
warn_unused_ignores = false

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: fast unit tests (no network, no disk I/O beyond temp files)",
    "integration: slower tests requiring network or full pipeline data",
]
