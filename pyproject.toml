[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cogcc_pipeline"
version = "0.1.0"
description = "COGCC oil and gas production data pipeline"
requires-python = ">=3.11"
dependencies = [
    "requests",
    "pandas>=2.0",
    "pyarrow",
    "dask[distributed]",
    "bokeh",
    "pyyaml",
    "scikit-learn",
    "numpy",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-mock",
    "mypy",
    "ruff",
    "pandas-stubs",
    "types-requests",
]

[project.scripts]
cogcc-pipeline = "cogcc_pipeline.pipeline:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["cogcc_pipeline*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
markers = [
    "unit: unit tests (no external dependencies)",
    "integration: integration tests (require data files or network)",
]
testpaths = ["tests"]
